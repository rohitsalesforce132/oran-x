# Quarkus Configuration
quarkus.application.name=ORAN-X
quarkus.application.version=1.0.0

# HTTP Configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# OpenAPI/Swagger Configuration
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.info-title=ORAN-X API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=O-RAN Intelligent xApp Lifecycle Management Platform

# Log Configuration
quarkus.log.category."com.oranx".level=INFO
quarkus.log.level=INFO
quarkus.log.min-level=DEBUG

# JSON Configuration
quarkus.jackson.fail-on-unknown-properties=false
quarkus.jackson.serialization.indent-output=true

# Build Configuration
quarkus.package.type=fast-jar
quarkus.native.enabled=false

# Dev Mode Configuration
%dev.quarkus.http.cors=true
%dev.quarkus.log.category."com.oranx".level=DEBUG
%dev.quarkus.log.level=DEBUG
